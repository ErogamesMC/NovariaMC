name: Discord Release Notifier

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Embed
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          script: |
            const webhookUrl = process.env.DISCORD_WEBHOOK_URL;
            if (!webhookUrl) {
              throw new Error("Falta la variable DISCORD_WEBHOOK_URL");
            }
            
            const release = context.payload.release;
            const title = release.name || release.tag_name;
            const desc = release.body || "Sin descripción.";
            
            const payload = {
              embeds: [{
                title: title,
                url: release.html_url,
                description: "**Versión:** `" + release.tag_name + "`\n\n" + desc,
                color: 5814783, // Color Blurple de Discord
                author: {
                  name: release.author.login,
                  icon_url: release.author.avatar_url
                },
                timestamp: release.published_at
              }]
            };
            
            const response = await fetch(webhookUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            
            if (!response.ok) {
              throw new Error("Discord API respondió con código: " + response.status);
            }
            console.log("Notificación enviada a Discord exitosamente.");

